<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Justin's Modern Schedule</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 p-4 md:p-8 bg-pattern relative overflow-x-hidden">
    
    <!-- Decorative background blobs -->
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-indigo-300 opacity-20 blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-rose-300 opacity-20 blur-[100px] pointer-events-none"></div>

    <div class="max-w-[1200px] mx-auto relative z-10">
        <!-- Header Section -->
        <header class="text-center mb-10 mt-4">
            <div class="inline-flex items-center justify-center space-x-2 bg-white px-4 py-1.5 rounded-full shadow-sm border border-slate-200 mb-4">
                <span class="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></span>
                <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">3rd Year • 1st Semester</span>
            </div>
            <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900 tracking-tight mb-3">
                Justin's Schedule
            </h1>
            <p class="text-slate-500 font-medium">A structured overview of classes and duties</p>
        </header>

        <!-- Legend -->
        <div class="flex justify-center gap-6 mb-6">
            <div class="flex items-center gap-2">
                <div class="w-4 h-4 rounded bg-indigo-100 border border-indigo-200 border-l-4 border-l-indigo-500 shadow-sm"></div>
                <span class="text-sm font-semibold text-slate-600">Class</span>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-4 h-4 rounded bg-rose-100 border border-rose-200 border-l-4 border-l-rose-500 shadow-sm"></div>
                <span class="text-sm font-semibold text-slate-600">Duty</span>
            </div>
        </div>

        <!-- Schedule Container (Scrollable on small screens) -->
        <div class="glass-panel border border-slate-200 rounded-3xl shadow-xl overflow-x-auto">
            <div class="min-w-[900px] p-6 pb-10">
                
                <!-- Days Header -->
                <div class="grid grid-cols-[70px_1fr_1fr_1fr_1fr_1fr] gap-4 mb-4">
                    <div class="text-right text-xs font-semibold text-slate-400 uppercase self-end pb-2 pr-2">Time</div>
                    <div class="text-center pb-3 border-b-2 border-slate-100"><span class="block text-xl font-bold text-slate-800">Mon</span><span class="text-xs text-slate-400 font-medium">Monday</span></div>
                    <div class="text-center pb-3 border-b-2 border-slate-100"><span class="block text-xl font-bold text-slate-800">Tue</span><span class="text-xs text-slate-400 font-medium">Tuesday</span></div>
                    <div class="text-center pb-3 border-b-2 border-slate-100"><span class="block text-xl font-bold text-slate-800">Wed</span><span class="text-xs text-slate-400 font-medium">Wednesday</span></div>
                    <div class="text-center pb-3 border-b-2 border-slate-100"><span class="block text-xl font-bold text-slate-800">Thu</span><span class="text-xs text-slate-400 font-medium">Thursday</span></div>
                    <div class="text-center pb-3 border-b-2 border-slate-100"><span class="block text-xl font-bold text-slate-800">Fri</span><span class="text-xs text-slate-400 font-medium">Friday</span></div>
                </div>

                <!-- Schedule Grid Body -->
                <div class="relative grid grid-cols-[70px_1fr_1fr_1fr_1fr_1fr] gap-4">
                    
                    <!-- Time Axis Lines (Generated by JS) -->
                    <div id="time-axis" class="relative">
                        <!-- Filled by JS -->
                    </div>

                    <!-- Background Grid Lines Container -->
                    <div id="grid-lines" class="absolute top-0 left-[70px] right-0 bottom-0 pointer-events-none z-0">
                        <!-- Filled by JS -->
                    </div>

                    <!-- Day Columns -->
                    <div id="col-1" class="relative z-10"></div>
                    <div id="col-2" class="relative z-10"></div>
                    <div id="col-3" class="relative z-10"></div>
                    <div id="col-4" class="relative z-10"></div>
                    <div id="col-5" class="relative z-10"></div>
                </div>

            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
